# SearXNG 配置 — Agent-Trader 专用
# 文档: https://docs.searxng.org/admin/settings/

use_default_settings: true

server:
  # 监听地址（容器内）
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "agent-trader-1145141919810"
  # 关闭 limiter（内部服务，不对外暴露）
  limiter: false

search:
  # 安全搜索关闭（金融新闻不需要过滤）
  safe_search: 0
  # 默认语言
  default_lang: "en"
  # 搜索格式
  formats:
    - html
    - json

# JSON API 输出配置
general:
  # 关闭调试模式
  debug: false

# 启用的搜索引擎
engines:
  # Google — 主搜索引擎
  - name: google
    engine: google
    shortcut: g
    disabled: false

  # Bing — 备用
  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  # DuckDuckGo — 备用
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  # Google News — 新闻专用
  - name: google news
    engine: google_news
    shortcut: gn
    disabled: false

  # Bing News — 新闻备用
  - name: bing news
    engine: bing_news
    shortcut: bn
    disabled: false

  # Yahoo Finance — 财经搜索
  - name: yahoo news
    engine: yahoo_news
    shortcut: yn
    disabled: false

  # Wikipedia — 背景知识
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

# 禁用不需要的引擎类别
categories_as_tabs:
  general:
  news:
  science:

# 出站请求设置
outgoing:
  # 请求超时
  request_timeout: 5.0
  # 最大请求并发数
  pool_maxsize: 20
  # User-Agent
  useragent_suffix: "AgentTrader/1.0"

# UI 设置（内部使用，不太重要）
ui:
  # 关闭静态文件压缩（减少 CPU 开销）
  static_use_hash: true
  default_theme: simple
