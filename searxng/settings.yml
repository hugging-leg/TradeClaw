# SearXNG Configuration — TradeClaw
# Docs: https://docs.searxng.org/admin/settings/

use_default_settings: true

server:
  # Listen address (inside container)
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "agent-trader-1145141919810"
  # Disable limiter (internal service, not exposed publicly)
  limiter: false

search:
  # Safe search off (financial news doesn't need filtering)
  safe_search: 0
  # Default language
  default_lang: "en"
  # Output formats
  formats:
    - html
    - json

# JSON API output settings
general:
  # Disable debug mode
  debug: false

# Enabled search engines
engines:
  # Google — primary search engine
  - name: google
    engine: google
    shortcut: g
    disabled: false

  # Bing — fallback
  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  # DuckDuckGo — fallback
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  # Google News — news-specific
  - name: google news
    engine: google_news
    shortcut: gn
    disabled: false

  # Bing News — news fallback
  - name: bing news
    engine: bing_news
    shortcut: bn
    disabled: false

  # Yahoo Finance — financial search
  - name: yahoo news
    engine: yahoo_news
    shortcut: yn
    disabled: false

  # Wikipedia — background knowledge
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

# Category tabs
categories_as_tabs:
  general:
  news:
  science:

# Outgoing request settings
outgoing:
  # Request timeout
  request_timeout: 5.0
  # Max concurrent requests
  pool_maxsize: 20
  # User-Agent suffix
  useragent_suffix: "TradeClaw/1.0"

# UI settings (internal use, not critical)
ui:
  # Enable static file hashing (reduce CPU overhead)
  static_use_hash: true
  default_theme: simple
