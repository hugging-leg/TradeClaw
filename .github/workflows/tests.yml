name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, '3.10', '3.11', '3.12']



    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up test environment
      run: |
        cp env.template .env
        echo "ALPACA_API_KEY=test_key" >> .env
        echo "ALPACA_SECRET_KEY=test_secret" >> .env
        echo "TIINGO_API_KEY=test_key" >> .env
        echo "OPENAI_API_KEY=test_key" >> .env
        echo "TELEGRAM_BOT_TOKEN=test_token" >> .env
        echo "TELEGRAM_CHAT_ID=test_chat_id" >> .env
        

    - name: Run unit tests
      run: |
        python run_tests.py --unit --coverage

    - name: Run integration tests (without real API calls)
      run: |
        python run_tests.py --fast
      continue-on-error: true

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Archive test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          htmlcov/
          .coverage
          coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy

    - name: Run black
      run: |
        black --check --diff .
      continue-on-error: true

    - name: Run isort
      run: |
        isort --check-only --diff .
      continue-on-error: true

    - name: Run flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

    - name: Run mypy
      run: |
        mypy src/ --ignore-missing-imports
      continue-on-error: true 