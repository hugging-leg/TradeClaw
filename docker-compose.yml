services:
  trading-agent:
    image: brerudike/trading-agent
    container_name: llm-trading-agent
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/user_data
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    volumes:
      - ./user_data:/app/user_data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/settings"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
      
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - trading-agent
