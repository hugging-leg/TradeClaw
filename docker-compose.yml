version: '3.8'

services:
  trading-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-trading-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/user_data
      - ENVIRONMENT=production
      - TZ=America/New_York
    volumes:
      - ./user_data:/app/user_data
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
